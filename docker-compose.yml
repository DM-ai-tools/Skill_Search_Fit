services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: skillsearchfit
      POSTGRES_PASSWORD: skillsearchfit
      POSTGRES_DB: skillsearchfit
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillsearchfit"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
